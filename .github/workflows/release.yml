name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_new: ${{ steps.version.outputs.is_new }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read version and check tag
        id: version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if git tag --list | grep -qx "v$VERSION"; then
            echo "Tag v$VERSION already exists, skipping"
            echo "is_new=false" >> $GITHUB_OUTPUT
          else
            echo "New version: $VERSION"
            echo "is_new=true" >> $GITHUB_OUTPUT
          fi

  release:
    name: Release v${{ needs.check-version.outputs.version }}
    needs: check-version
    if: needs.check-version.outputs.is_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Build & test
        run: |
          cargo build --all-features
          cargo test --all-features

      - name: Create tag and GitHub release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        with:
          script: |
            const tag = `v${process.env.VERSION}`;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: `## Install\n\n\`\`\`toml\n[dependencies]\ndata-studio-agent = { git = "https://github.com/geekfun/data-studio-agent", tag = "v${process.env.VERSION}" }\n\`\`\`\n\nSee the [repository](https://github.com/geekfun/data-studio-agent) for documentation.`,
              draft: false,
              prerelease: false,
            });
